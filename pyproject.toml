[project]
name = "door-sync"
version = "0.1.0"
description = "CiviCRM-to-UniFi sync service for door access control"
readme = "README.md"
authors = [
    { name = "Ryan Morash", email = "ryan@tvcog.net" }
]
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.28.1",
]

[project.scripts]
door-sync = "door_sync.__main__:main"

[build-system]
requires = ["uv_build>=0.11.15,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=9.0.3",
    "ruff>=0.15.13",
]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src", "tests"]
mypy_path = ["src"]
explicit_package_bases = true
